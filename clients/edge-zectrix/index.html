<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>设备初始化配置</title>
    <style>
        :root {
            --brand: #5585a9;
            --brand-light: #7ba3c2;
            --brand-dark: #3e6685;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --red-100: #fee2e2;
            --red-700: #b91c1c;
            --green-100: #dcfce3;
            --green-600: #16a34a;
            --green-700: #15803d;
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-500: #3b82f6;
            --blue-700: #1d4ed8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            color: var(--slate-700);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Card Layout */
        .card {
            background: white;
            width: 100%;
            max-width: 448px;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--slate-200);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--brand);
            padding: 1.5rem;
            color: white;
            text-align: center;
            position: relative;
        }

        .header-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            pointer-events: none;
        }

        .header-icon {
            width: 4rem;
            height: 4rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem auto;
            backdrop-filter: blur(4px);
        }

        .device-badge {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--brand-light);
            background: rgba(255, 255, 255, 0.1);
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
        }

        /* Content Body */
        .content {
            padding: 1.5rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 0.25rem;
            background: var(--slate-100);
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            background: transparent;
            color: var(--slate-500);
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: var(--brand);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* Network List */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .list-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--brand);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .network-list {
            height: 16rem;
            overflow-y: auto;
            padding-right: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .network-list::-webkit-scrollbar {
            width: 6px;
        }

        .network-list::-webkit-scrollbar-track {
            background: var(--slate-100);
        }

        .network-list::-webkit-scrollbar-thumb {
            background: var(--slate-300);
            border-radius: 4px;
        }

        .network-item {
            padding: 0.75rem;
            border: 1px solid var(--slate-200);
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .network-item:hover {
            border-color: var(--brand-light);
            background: var(--slate-50);
        }

        .network-item.selected {
            border-color: var(--brand);
            background: rgba(85, 133, 169, 0.05);
            box-shadow: 0 0 0 1px var(--brand);
        }

        .network-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .network-icon {
            color: var(--slate-400);
        }

        .network-item.selected .network-icon {
            color: var(--brand);
        }

        .network-name {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--slate-700);
        }

        .network-item.selected .network-name {
            color: var(--brand);
        }

        .network-signal {
            font-size: 0.75rem;
            color: var(--slate-400);
            margin-top: 0.125rem;
        }

        /* Forms */
        .form-group {
            margin-top: 1.5rem;
        }

        .label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--slate-700);
            margin-bottom: 0.25rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 0.5rem 1rem;
            border: 1px solid var(--slate-300);
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .input-field:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(85, 133, 169, 0.2);
        }

        .toggle-pwd {
            position: absolute;
            right: 0.75rem;
            top: 0.625rem;
            background: none;
            border: none;
            color: var(--slate-400);
            cursor: pointer;
        }

        .hint-box {
            background: var(--blue-50);
            border: 1px solid var(--blue-100);
            border-radius: 0.5rem;
            padding: 0.75rem;
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .hint-icon {
            color: var(--blue-500);
            flex-shrink: 0;
        }

        .hint-text {
            font-size: 0.75rem;
            color: var(--blue-700);
        }

        /* Buttons */
        .submit-btn {
            width: 100%;
            margin-top: 2rem;
            background: var(--brand);
            color: white;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--brand-dark);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status & Restart */
        .status-msg {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            display: none;
        }

        .status-success {
            background: var(--green-100);
            color: var(--green-700);
        }

        .status-error {
            background: var(--red-100);
            color: var(--red-700);
        }

        .restart-view {
            text-align: center;
            padding: 2rem 0;
            display: none;
        }

        .success-icon {
            width: 4rem;
            height: 4rem;
            background: var(--green-100);
            color: var(--green-600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
        }

        .progress-bar {
            width: 100%;
            background: var(--slate-200);
            border-radius: 9999px;
            height: 0.5rem;
            margin: 1.5rem 0;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            background: var(--brand);
            transition: width 1s linear;
            width: 100%;
        }

        /* Footer */
        .footer {
            background: var(--slate-50);
            padding: 1rem;
            text-align: center;
            border-top: 1px solid var(--slate-100);
            font-size: 0.75rem;
            color: var(--slate-400);
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: var(--slate-400);
            border: 1px dashed var(--slate-300);
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Header -->
    <div class="header">
        <svg class="header-bg" height="100%" width="100%">
            <pattern height="40" id="pattern-circles" patternUnits="userSpaceOnUse" width="40" x="0" y="0">
                <circle cx="20" cy="20" fill="currentColor" r="2"></circle>
            </pattern>
            <rect fill="url(#pattern-circles)" height="100%" width="100%" x="0" y="0"></rect>
        </svg>
        <div class="header-icon">
            <svg fill="none" height="32" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                 stroke-width="2"
                 viewBox="0 0 24 24" width="32">
                <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
            </svg>
        </div>
        <h1 style="font-size: 1.25rem; font-weight: 700; letter-spacing: 0.025em;">设备网络配置</h1>
        <div class="device-badge">
            <span id="dev-id">获取中...</span> <span style="margin:0 4px">|</span> FW: <span id="dev-fw">--</span>
        </div>
    </div>

    <div class="content">
        <!-- Restarting State -->
        <div class="restart-view" id="view-restart">
            <div class="success-icon">
                <svg fill="none" height="32" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                     stroke-width="2"
                     viewBox="0 0 24 24" width="32">
                    <path d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h3 style="font-size: 1.125rem; font-weight: 700; color: var(--slate-800); margin-bottom: 0.5rem;">
                配置成功</h3>
            <p style="color: var(--slate-500); margin-bottom: 1.5rem;">设备将在 <span id="countdown-text"
                                                                                      style="color: var(--brand); font-weight: 700; font-size: 1.25rem;">5</span>
                秒后重启</p>
            <div class="progress-bar">
                <div class="progress-inner" id="progress-inner"></div>
            </div>
            <p style="font-size: 0.75rem; color: var(--slate-400);">请稍候，不要关闭电源</p>
        </div>

        <!-- Configuration Form -->
        <div id="view-config">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-list" onclick="setMode('list')">扫描网络</button>
                <button class="tab-btn" id="tab-manual" onclick="setMode('manual')">手动输入</button>
            </div>

            <!-- List Mode -->
            <div id="mode-list">
                <div class="list-header">
                    <span class="list-title">可用网络</span>
                    <button class="refresh-btn" id="btn-refresh" onclick="fetchNetworks()">
                        <svg fill="none" height="12" stroke="currentColor" stroke-linecap="round"
                             stroke-linejoin="round"
                             stroke-width="2" viewBox="0 0 24 24" width="12">
                            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        刷新
                    </button>
                </div>

                <div id="loading-spinner" style="text-align: center; padding: 2rem 0; display: none;">
                    <div class="spin"
                         style="width: 2rem; height: 2rem; border: 2px solid transparent; border-bottom-color: var(--brand); border-radius: 50%; display: inline-block;"></div>
                </div>

                <div class="empty-state hidden" id="empty-state">
                    <svg fill="none" height="40" stroke="currentColor" stroke-width="2"
                         style="margin: 0 auto 0.5rem auto; opacity: 0.5;" viewBox="0 0 24 24"
                         width="40">
                        <path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"
                              stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p style="font-size: 0.875rem;">未找到网络或获取失败</p>
                    <p style="font-size: 0.75rem; margin-top: 0.25rem;">请尝试手动输入或刷新</p>
                </div>

                <div class="network-list" id="network-container">
                    <!-- Network items will be injected here via JS -->
                </div>
            </div>

            <!-- Manual Mode -->
            <div class="hidden" id="mode-manual">
                <div>
                    <label class="label">网络名称 (SSID)</label>
                    <div class="input-wrap">
                        <input class="input-field" id="input-ssid" oninput="checkForm()"
                               placeholder="输入您的 Wi-Fi 名称"
                               type="text">
                    </div>
                </div>
                <div class="hint-box">
                    <svg class="hint-icon" fill="currentColor" height="20" viewBox="0 0 20 20" width="20">
                        <path clip-rule="evenodd"
                              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                              fill-rule="evenodd"/>
                    </svg>
                    <p class="hint-text">如果您要连接的网络未出现在列表中，请在此处手动输入。</p>
                </div>
            </div>

            <!-- Password Field (Common) -->
            <div class="form-group">
                <label class="label">密码</label>
                <div class="input-wrap">
                    <input class="input-field" id="input-pwd" oninput="checkForm()" placeholder="输入 Wi-Fi 密码"
                           style="padding-right: 2.5rem;" type="password">
                    <button class="toggle-pwd" onclick="togglePassword()" type="button">
                        <svg fill="none" height="20" id="icon-eye-off" stroke="currentColor" stroke-width="2"
                             viewBox="0 0 24 24"
                             width="20">
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                  stroke-linecap="round"
                                  stroke-linejoin="round"/>
                        </svg>
                        <svg class="hidden" fill="none" height="20" id="icon-eye-on" stroke="currentColor"
                             stroke-width="2"
                             viewBox="0 0 24 24" width="20">
                            <path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                  stroke-linecap="round"
                                  stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Server Configuration -->
            <div class="form-group">
                <label class="label">服务器地址</label>
                <div class="input-wrap">
                    <input class="input-field" id="input-server-host" oninput="checkForm()"
                           placeholder="例如: 192.168.1.100" type="text" value="">
                </div>
            </div>

            <div class="form-group">
                <label class="label">服务器端口</label>
                <div class="input-wrap">
                    <input class="input-field" id="input-server-port" oninput="checkForm()"
                           placeholder="8080" type="text" value="8080">
                </div>
            </div>

            <!-- Action Button -->
            <button class="submit-btn" disabled id="btn-submit" onclick="submitConfig()">
                <svg class="spin hidden" fill="none" height="20" id="submit-spinner" style="margin-right: 0.5rem;"
                     viewBox="0 0 24 24"
                     width="20">
                    <circle cx="12" cy="12" opacity="0.25" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                          fill="currentColor"
                          opacity="0.75"></path>
                </svg>
                <span id="submit-text">保存并连接</span>
            </button>

            <!-- Status Message -->
            <div class="status-msg" id="status-msg">
                <svg class="hidden" fill="currentColor" height="20" id="status-icon-success" viewBox="0 0 20 20"
                     width="20">
                    <path clip-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                          fill-rule="evenodd"/>
                </svg>
                <svg class="hidden" fill="currentColor" height="20" id="status-icon-error" viewBox="0 0 20 20"
                     width="20">
                    <path clip-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                          fill-rule="evenodd"/>
                </svg>
                <span id="status-text"></span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">Embedded Config Interface v1.0</div>
</div>

<script>
    // 状态管理
    let currentMode = 'list';
    let selectedSsid = '';
    let networks = [];

    // DOM 元素缓存
    const $ = id => document.getElementById(id);

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', () => {
        fetchInfo();
        fetchNetworks();
    });

    // 获取设备信息
    async function fetchInfo() {
        try {
            const res = await fetch('/info');
            if (res.ok) {
                const data = await res.json();
                $('dev-id').textContent = data.device_id || data.id || 'Unknown';
                $('dev-fw').textContent = data.version || data.fw || '-';
            }
        } catch (e) {
            $('dev-id').textContent = '获取失败';
        }
    }

    // 获取网络列表
    async function fetchNetworks() {
        $('btn-refresh').disabled = true;
        $('loading-spinner').style.display = 'block';
        $('network-container').style.display = 'none';
        $('empty-state').classList.add('hidden');
        $('status-msg').style.display = 'none';

        try {
            const res = await fetch('/list');
            if (res.ok) {
                networks = await res.json();
                if (!Array.isArray(networks)) networks = [];
            } else {
                networks = [];
            }
        } catch (e) {
            networks = [];
        }

        renderNetworks();
        $('loading-spinner').style.display = 'none';
        $('btn-refresh').disabled = false;
    }

    // 渲染网络列表
    function renderNetworks() {
        const container = $('network-container');
        container.innerHTML = '';

        if (networks.length === 0) {
            $('empty-state').classList.remove('hidden');
            container.style.display = 'none';
            return;
        }

        container.style.display = 'flex';
        networks.forEach(net => {
            const isSelected = selectedSsid === net.ssid;
            const div = document.createElement('div');
            div.className = `network-item ${isSelected ? 'selected' : ''}`;
            div.onclick = () => selectNetwork(net.ssid);

            div.innerHTML = `
                <div class="network-info">
                    <div class="network-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
                        </svg>
                    </div>
                    <div>
                        <div class="network-name">${escapeHtml(net.ssid)}</div>
                        <div class="network-signal">信号强度：${net.signal_strength || 0}%</div>
                    </div>
                </div>
                ${isSelected ? `
                <div style="color: var(--brand);">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                </div>` : ''}
            `;
            container.appendChild(div);
        });
        checkForm();
    }

    // 切换标签页 (列表/手动)
    function setMode(mode) {
        currentMode = mode;
        if (mode === 'list') {
            $('tab-list').classList.add('active');
            $('tab-manual').classList.remove('active');
            $('mode-list').classList.remove('hidden');
            $('mode-manual').classList.add('hidden');
        } else {
            $('tab-manual').classList.add('active');
            $('tab-list').classList.remove('active');
            $('mode-manual').classList.remove('hidden');
            $('mode-list').classList.add('hidden');
            selectedSsid = ''; // 清除列表选择
            renderNetworks(); // 刷新高亮状态
        }
        checkForm();
    }

    // 选择 Wi-Fi 列表项
    function selectNetwork(ssid) {
        selectedSsid = ssid;
        renderNetworks();
    }

    // 切换密码可见性
    function togglePassword() {
        const input = $('input-pwd');
        const eyeOff = $('icon-eye-off');
        const eyeOn = $('icon-eye-on');

        if (input.type === 'password') {
            input.type = 'text';
            eyeOff.classList.add('hidden');
            eyeOn.classList.remove('hidden');
        } else {
            input.type = 'password';
            eyeOn.classList.add('hidden');
            eyeOff.classList.remove('hidden');
        }
    }

    // 校验表单状态控制按钮
    function checkForm() {
        const manualSsid = $('input-ssid').value.trim();
        const pwd = $('input-pwd').value;
        const serverHost = $('input-server-host').value.trim();
        const serverPort = $('input-server-port').value.trim();
        const currentSsid = currentMode === 'list' ? selectedSsid : manualSsid;

        // 检查必填字段：SSID、密码、服务器地址和端口
        const isValid = currentSsid && pwd && serverHost && serverPort;
        $('btn-submit').disabled = !isValid;
    }

    // 提交配置
    async function submitConfig() {
        const manualSsid = $('input-ssid').value.trim();
        const pwd = $('input-pwd').value;
        const serverHost = $('input-server-host').value.trim();
        const serverPort = $('input-server-port').value.trim();
        const currentSsid = currentMode === 'list' ? selectedSsid : manualSsid;

        if (!currentSsid || !pwd || !serverHost || !serverPort) return;

        // UI 加载状态
        $('btn-submit').disabled = true;
        $('submit-spinner').classList.remove('hidden');
        $('submit-text').textContent = '正在保存...';
        $('status-msg').style.display = 'none';

        const params = new URLSearchParams();
        params.append('ssid', currentSsid);
        params.append('password', pwd);
        params.append('server_host', serverHost);
        params.append('server_port', serverPort);

        try {
            const res = await fetch('/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: params.toString()
            });

            if (res.ok) {
                startRestartSequence();
            } else {
                throw new Error('Save failed');
            }
        } catch (e) {
            showStatus('error', '保存失败，请检查网络或重试');
            // 恢复按钮状态
            $('btn-submit').disabled = false;
            $('submit-spinner').classList.add('hidden');
            $('submit-text').textContent = '保存并连接';
        }
    }

    // 启动重启倒计时
    function startRestartSequence() {
        $('view-config').style.display = 'none';
        $('view-restart').style.display = 'block';

        let count = 5;
        const countText = $('countdown-text');
        const bar = $('progress-inner');

        bar.style.width = '100%';

        const timer = setInterval(() => {
            count--;
            countText.textContent = count;
            bar.style.width = (count / 5 * 100) + '%';

            if (count <= 0) {
                clearInterval(timer);
            }
        }, 1000);
    }

    // 显示状态消息
    function showStatus(type, msg) {
        const msgBox = $('status-msg');
        msgBox.className = `status-msg ${type === 'success' ? 'status-success' : 'status-error'}`;
        $('status-icon-success').classList.toggle('hidden', type !== 'success');
        $('status-icon-error').classList.toggle('hidden', type !== 'error');
        $('status-text').textContent = msg;
        msgBox.style.display = 'flex';
    }

    // 简易 XSS 防护
    function escapeHtml(unsafe) {
        return (unsafe || '').replace(/[&<"']/g, function (m) {
            switch (m) {
                case '&':
                    return '&amp;';
                case '<':
                    return '&lt;';
                case '"':
                    return '&quot;';
                default:
                    return '&#039;';
            }
        });
    }
</script>

</body>
</html>
